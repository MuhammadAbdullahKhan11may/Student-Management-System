<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EduTrack — Manage Students Efficiently</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Navbar -->
  <header class="navbar">
    <div class="nav-left">
      <button class="btn btn-outline">Login</button>
      <button class="btn btn-primary">Sign Up</button>
    </div>

    <div class="nav-center">
      <span class="logo-icon">🎓</span>
      <span class="logo-text">EduTrack</span>
    </div>

    <nav class="nav-right">
      <a href="#">Features</a>
      <a href="#">About</a>
      <a href="#">Pricing</a>
    </nav>
  </header>

  <!-- Hero -->
  <main class="hero">
    <div class="hero-grid-bg"></div>

    <div class="badge">
      <span class="badge-dot">●</span>
      Built for universities &amp; institutions
    </div>

    <h1 class="hero-title">
      Manage Students<br>
      <span class="highlight">Efficiently</span>
    </h1>

    <p class="hero-subtitle">
      A smart system to organize, track, and manage student data — from
      enrollment to graduation, all in one place.
    </p>

    <div class="hero-actions">
      <button class="btn btn-primary btn-large">Get Started <span class="arrow">→</span></button>
      <a href="#" class="link-learn-more">Learn more</a>
    </div>

    <!-- Stats -->
    <div class="stats-bar">
      <div class="stat">
        <div class="stat-number">50K+</div>
      </div>
      <div class="stat">
        <div class="stat-number">200+</div>
      </div>
      <div class="stat">
        <div class="stat-number">99.9%</div>
      </div>
      <div class="stat">
        <div class="stat-number">4.9★</div>
      </div>
    </div>
  </main>

  <!-- Help button -->
  <button class="help-btn">?</button>

</body>
</html>
